<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Surfer Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-color: #eaf3fa; --card-bg: #ffffff; --border-blue: #3a97e8; }
        body { font-family: sans-serif; background-color: var(--bg-color); display: flex; flex-direction: column; align-items: center; padding: 20px 10px; }
        .container { width: 100%; max-width: 440px; background-color: white; border: 2px solid var(--border-blue); border-radius: 20px; padding: 15px; }
        h1 { text-align: center; color: #1e3a8a; font-size: 22px; margin-bottom: 15px; }
        
        /* 嵌入地圖容器 */
        .map-container { width: 100%; height: 350px; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 2px solid var(--border-blue); }
        
        .panel { background: white; border: 1.5px solid var(--border-blue); border-radius: 12px; padding: 15px; text-align: center; margin-bottom: 10px; }
        
        /* 狀態燈 */
        .status-box { text-align: center; font-size: 12px; color: #666; margin-top: 10px; }
        .light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #22c55e; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏄‍♂️ Surfer Weather Dashboard</h1>

    <div class="map-container">
        <iframe width="100%" height="100%" src="https://embed.windy.com/embed2.html?lat=24.8&lon=121.8&zoom=9&level=surface&overlay=waves&menu=&message=&marker=&calendar=now&pressure=&type=map&location=coordinates&detail=&detailLat=24.8&detailLon=121.8&metricWind=default&metricTemp=default&radarRange=-1" frameborder="0"></iframe>
    </div>

    <div class="panel">
        <p>即時浪況已由專業衛星即時更新</p>
        <div class="status-box">
            <div class="light"></div> 連線狀態：正常
        </div>
    </div>
    
    <footer style="text-align: center; font-size: 11px; margin-top: 10px;">
        Powered by Windy.com
    </footer>
</div>

</body>
</html>
