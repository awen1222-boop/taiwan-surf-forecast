<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>硬體工程師速算工具</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #333; padding-bottom: 5px; }
        input { width: 100px; padding: 5px; margin: 5px; }
        button { padding: 5px 15px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>硬體工程師常用工具</h1>

    <div class="card">
        <h2>1. 分壓計算 (Vout)</h2>
        Vin: <input type="number" id="vin" placeholder="Vin"> 
        R1: <input type="number" id="r1" placeholder="R1 (Ω)"> 
        R2: <input type="number" id="r2" placeholder="R2 (Ω)">
        <button onclick="calcVoltage()">計算</button>
        <p>Vout = <span id="vout_res">0</span> V</p>
    </div>

    <div class="card">
        <h2>2. 功率計算 (P = V * I)</h2>
        V: <input type="number" id="p_v" placeholder="V"> 
        I: <input type="number" id="p_i" placeholder="I (A)">
        <button onclick="calcPower()">計算</button>
        <p>P = <span id="p_res">0</span> W</p>
    </div>

    <div class="card">
        <h2>3. 長度/時間換算</h2>
        <input type="number" id="len_val" placeholder="數值">
        <select id="len_unit">
            <option value="mil_mm">mil 轉 mm</option>
            <option value="mm_mil">mm 轉 mil</option>
            <option value="inch_mm">inch 轉 mm</option>
            <option value="ps_inch">ps 轉 inch (FR4, ~6 inch/ns)</option>
        </select>
        <button onclick="calcLength()">轉換</button>
        <p>結果 = <span id="len_res">0</span></p>
    </div>

    <div class="card">
        <h2>4. 歐姆定律 (V=IR)</h2>
        V: <input type="number" id="ohm_v" placeholder="V">
        I: <input type="number" id="ohm_i" placeholder="I (A)">
        R: <input type="number" id="ohm_r" placeholder="R (Ω)">
        <button onclick="calcOhm()">計算 (請留空一項)</button>
    </div>

    <div class="card">
        <h2>5. LED 限流電阻 (R = (Vcc-Vf)/I)</h2>
        Vcc: <input type="number" id="led_vcc" placeholder="Vcc">
        Vf: <input type="number" id="led_vf" placeholder="Vf">
        I(mA): <input type="number" id="led_i" placeholder="I (mA)">
        <button onclick="calcLed()">計算</button>
        <p>電阻 = <span id="led_res">0</span> Ω</p>
    </div>

    <script>
        function calcVoltage() {
            let vin = document.getElementById('vin').value;
            let r1 = document.getElementById('r1').value;
            let r2 = document.getElementById('r2').value;
            document.getElementById('vout_res').innerText = (vin * r2 / (Number(r1) + Number(r2))).toFixed(3);
        }
        function calcPower() {
            document.getElementById('p_res').innerText = (document.getElementById('p_v').value * document.getElementById('p_i').value).toFixed(3);
        }
        function calcLength() {
            let v = document.getElementById('len_val').value;
            let u = document.getElementById('len_unit').value;
            let res = 0;
            if(u == 'mil_mm') res = v * 0.0254;
            if(u == 'mm_mil') res = v / 0.0254;
            if(u == 'inch_mm') res = v * 25.4;
            if(u == 'ps_inch') res = v * 0.006; // 假設 FR4 傳輸延遲
            document.getElementById('len_res').innerText = res.toFixed(4);
        }
        function calcOhm() {
            let v = document.getElementById('ohm_v').value;
            let i = document.getElementById('ohm_i').value;
            let r = document.getElementById('ohm_r').value;
            if(!v) alert("V = " + (i*r).toFixed(2));
            else if(!i) alert("I = " + (v/r).toFixed(4));
            else if(!r) alert("R = " + (v/i).toFixed(2));
        }
        function calcLed() {
            let vcc = document.getElementById('led_vcc').value;
            let vf = document.getElementById('led_vf').value;
            let i = document.getElementById('led_i').value / 1000;
            document.getElementById('led_res').innerText = ((vcc - vf) / i).toFixed(2);
        }
    </script>
</body>
</html>
