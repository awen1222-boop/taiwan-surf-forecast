<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surfer Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #eaf3fa;
            --card-bg: #ffffff;
            --border-blue: #3a97e8;
            --text-dark: #333333;
            --text-muted: #777777;
            --wave-purple: #6366f1;
            --wind-green: #84cc16;
            --light-blue: #f0f7fd;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background-color: #f7fbfe;
            border: 2px solid var(--border-blue);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: #1e3a8a;
            font-size: 24px;
            margin-top: 5px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* 地點切換按鈕 */
        .location-selector {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-location {
            flex: 1;
            background-color: #ffffff;
            border: 1.5px solid var(--border-blue);
            color: #1e3a8a;
            padding: 8px 5px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            white-space: nowrap;
        }

        .btn-location.active {
            background-color: #2563eb;
            color: #ffffff;
            border-color: #2563eb;
        }

        /* 上方雙卡片排版 */
        .top-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .main-card {
            background: var(--card-bg);
            border: 1.5px solid var(--border-blue);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

            padding: 15px 0 10px;

            align
