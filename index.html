<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surfer Weather Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #eaf3fa;
            --card-bg: #ffffff;
            --border-blue: #3a97e8;
            --text-dark: #333333;
            --text-muted: #777777;
            --wave-blue: #0284c7;
            --tide-teal: #0d9488;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background-color: #f7fbfe;
            border: 2px solid var(--border-blue);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* 標題與衝浪 Icon (加入原生 Emoji 確保絕對顯示) */
        h1 {
            text-align: center;
            color: #1e3a8a;
            font-size: 23px;
            margin-top: 5px;
            margin-bottom: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .location-selector {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-location {
            flex: 1;
            background-color: #ffffff;
            border: 1.5px solid var(--border-blue);
            color: #1e3a8a;
            padding: 8px 5px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            white-space: nowrap;
        }

        .btn-location.active {
            background-color: #2563eb;
            color: #ffffff;
            border-color: #2563eb;
        }

        /* 一體化摘要卡片佈局 */
        .integrated-summary-card {
            width: 100%;
            background-color: var(--card-bg);
            border: 1.5px solid var(--border-blue);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            text-align: center;
            margin-bottom: 15px;
        }

        .wave-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--border-blue);
        }

        .wave-card-top {
            padding: 15px 0 10px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            font-size: 52px;
        }

        .wave-card-banner {
            width: 100%;
            padding: 8px 0;
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background-color: #6366f1;
        }

        .wind-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wind-card-top {
            padding: 15px 0 10px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #60a5fa;
            font-size: 52px;
        }

        .wind-card-banner {
            width: 100%;
            padding: 8px 0;
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background-color: #84cc16;
        }

        .integrated-summary-card span.unit {
            font-size: 16px;
            align-self: flex-end;
            margin-bottom: 6px;
            margin-left: 2px;
        }

        .compass-icon {
            font-size: 24px;
            margin-left: 8px;
            display: inline-block;
            transition: transform 0.5s ease;
        }

        .card-footer {
            padding: 10px 0;
            font-size: 20px;
            color: #555555;
            font-weight: 500;
            width: 100%;
            background-color: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }

        /* 曲線圖卡片佈局 */
        .chart-card {
            background: var(--card-bg);
            border: 1.5px solid var(--border-blue);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            position: relative;
        }

        .chart-title {
            font-size: 14px;
            font-weight: bold;
            color: #1e3a8a;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            height: 160px;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* 詳細數據卡片佈局 */
        .env-card {
            background: var(--card-bg);
            border: 1.5px solid var(--border-blue);
            border-radius: 12px;
            padding: 15px 10px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            text-align: center;
            margin-bottom: 15px;
        }

        .env-item {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 95px;
        }

        .env-time { font-size: 15px; color: #444444; font-weight: 500; }
        .env-label { font-size: 13px; font-weight: bold; color: var(--text-muted); }
        .env-value { font-size: 18px; font-weight: bold; color: #333333; }
        .env-icon { font-size: 32px; }

        /* 底部燈號與資訊 */
        footer {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #cbd5e1;
        }

        .api-status {
            display: flex
