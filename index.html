<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣衝浪浪況儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: #f0f4f8; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: 2px solid #3a97e8; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; }
        .tab.active { background: #3a97e8; color: white; }
        .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .big { font-size: 28px; font-weight: bold; color: #1e3a8a; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; background: white; padding: 15px; border-radius: 12px; text-align: center; }
        .status { text-align: center; margin-top: 20px; padding: 10px; font-size: 14px; }
        .light { display: inline-block; width: 12px; height: 12px; border-radius: 50%; background: #ef4444; }
        .light.green { background: #22c55e; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs" id="tabContainer">
        <div class="tab active" onclick="changeSpot('fulong', this)">福隆</div>
        <div class="tab" onclick="changeSpot('wushi', this)">烏石港</div>
        <div class="tab" onclick="changeSpot('jici', this)">磯崎</div>
    </div>

    <div class="cards">
        <div class="card">浪高<div class="big" id="waveH">--</div>m</div>
        <div class="card">風速<div class="big" id="windS">--</div>m/s</div>
    </div>

    <div class="grid">
        <div class="item">日出<span id="sunrise">--</span></div>
        <div class="item">日落<span id="sunset">--</span></div>
        <div class="item">風向<span id="windD">--</span>°</div>
        <div class="item">浪向<span id="waveD">--</span>°</div>
    </div>

    <div class="chart-card" style="background:white; padding:10px; border-radius:12px; margin-top:15px;">
        <canvas id="waveChart"></canvas>
    </div>

    <div class="status">
        <div id="statusLight" class="light"></div> <span id="statusTxt">連線中...</span>
    </div>
</div>

<script>
const spots = {
    fulong: { lat: 25.021, lon: 121.944 },
    wushi: { lat: 24.867, lon: 121.842 },
    jici: { lat: 23.742, lon: 121.557 }
};

let currentSpot = 'fulong';
let chart;

async function loadData() {
    const spot = spots[currentSpot];
    const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${spot.lat}&longitude=${spot.lon}&current=temperature_2m,wind_speed_10m,wind_direction_10m&hourly=uv_index&daily=sunrise,sunset&timezone=Asia/Taipei`;
    const marineUrl = `https://marine-api.open-meteo.com/v1/marine?latitude=${spot.lat}&longitude=${spot.lon}&hourly=wave_height,wave_period,wave_direction&timezone=Asia/Taipei`;

    try {
        const [weather, marine] = await Promise.all([
            fetch(weatherUrl).then(r => r.json()),
            fetch(marineUrl).then(r => r.json())
        ]);

        document.getElementById('waveH').innerText = marine.hourly.wave_height[0].toFixed(1);
        document.getElementById('windS').innerText = weather.current.wind_speed_10m;
        document.getElementById('sunrise').innerText = weather.daily.sunrise[0].substring(11,16);
        document.getElementById('sunset').innerText = weather.daily.sunset[0].substring(11,16);
        document.getElementById('windD').innerText = weather.current.wind_direction_10m;
        document.getElementById('waveD').innerText = marine.hourly.wave_direction[0];

        document.getElementById('statusLight').classList.add('green');
        document.getElementById('statusTxt').innerText = "Open-Meteo 連線成功";

        updateChart(marine.hourly.wave_height.slice(0, 24));
    } catch(e) {
        document.getElementById('statusTxt').innerText = "連線失敗";
        console.error(e);
    }
}

function changeLocation(spot, el) {
    currentSpot = spot;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    loadData();
}

function updateChart(data) {
    const ctx = document.getElementById('waveChart').getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: 'line',
        data: { labels: Array.from({length:24}, (_,i)=>i+'時'), datasets: [{ label: '浪高', data: data, borderColor: '#3a97e8', fill: true }] },
        options: { responsive: true }
    });
}

loadData();
</script>
</body>
</html>
