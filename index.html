<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>台灣衝浪浪況</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#f4f4f4;
    font-family:Arial;
    margin:20px;
}

.container{
    max-width:420px;
    margin:auto;
}

.card-row{
    display:flex;
    gap:10px;
}

.card{
    flex:1;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card-top{
    padding:20px;
    text-align:center;
}

.card-value{
    font-size:42px;
    font-weight:bold;
}

.card-sub{
    font-size:18px;
    color:#666;
}

.wave{
    background:#1976d2;
    color:white;
}

.wind{
    background:#c9c53d;
    color:white;
}

.info{
    margin-top:10px;
    background:white;
    border-radius:10px;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.info-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    text-align:center;
}

.info-item{
    font-size:18px;
}

canvas{
    margin-top:10px;
    background:white;
    border-radius:10px;
    padding:10px;
}

</style>
</head>
<body>

<div class="container">

    <div class="card-row">

        <div class="card">
            <div class="card-top wave">
                <div class="card-value" id="waveHeight">--</div>
                <div>m</div>
            </div>

            <div class="card-sub" id="wavePeriod">
                -- s
            </div>
        </div>

        <div class="card">
            <div class="card-top wind">
                <div class="card-value" id="windSpeed">--</div>
                <div>m/s</div>
            </div>

            <div class="card-sub" id="windDir">
                --
            </div>
        </div>

    </div>

    <div class="info">

        <div class="info-grid">

            <div class="info-item">
                ☀️<br>
                <span id="sunrise">--</span>
            </div>

            <div class="info-item">
                🌅<br>
                <span id="sunset">--</span>
            </div>

            <div class="info-item">
                🌡️<br>
                <span id="temp">--</span>°
            </div>

            <div class="info-item">
                UV<br>
                <span id="uv">--</span>
            </div>

        </div>

    </div>

    <canvas id="waveChart"></canvas>

</div>

<script>

const lat = 24.867;
const lon = 121.842;

// 烏石港

async function loadData(){

const url =
`https://api.open-meteo.com/v1/forecast
?latitude=${lat}
&longitude=${lon}
&hourly=temperature_2m,uv_index
&daily=sunrise,sunset
&current=temperature_2m
&timezone=Asia/Taipei`;

const marine =
`https://marine-api.open-meteo.com/v1/marine
?latitude=${lat}
&longitude=${lon}
&hourly=wave_height,wave_period,wave_direction`;

const wind =
`https://api.open-meteo.com/v1/forecast
?latitude=${lat}
&longitude=${lon}
&current=wind_speed_10m,wind_direction_10m`;

const [
    weather,
    sea,
    windData
] = await Promise.all([
    fetch(url).then(r=>r.json()),
    fetch(marine).then(r=>r.json()),
    fetch(wind).then(r=>r.json())
]);

document.getElementById("waveHeight").innerText =
sea.hourly.wave_height[0].toFixed(1);

document.getElementById("wavePeriod").innerText =
sea.hourly.wave_period[0].toFixed(1)+" s";

document.getElementById("windSpeed").innerText =
Math.round(windData.current.wind_speed_10m);

document.getElementById("windDir").innerText =
windData.current.wind_direction_10m+"°";

document.getElementById("sunrise").innerText =
weather.daily.sunrise[0].substring(11,16);

document.getElementById("sunset").innerText =
weather.daily.sunset[0].substring(11,16);

document.getElementById("temp").innerText =
weather.current.temperature_2m;

document.getElementById("uv").innerText =
Math.max(...weather.hourly.uv_index);

createChart(sea);

}

function createChart(sea){

const labels =
sea.hourly.time.slice(0,24).map(t=>t.substring(11,16));

const values =
sea.hourly.wave_height.slice(0,24);

new Chart(
document.getElementById('waveChart'),
{
type:'line',
data:{
labels:labels,
datasets:[{
label:'浪高(m)',
data:values
}]
},
options:{
responsive:true,
plugins:{
legend:{
display:false
}
}
}
}
);

}

loadData();

</script>

</body>
</html>
