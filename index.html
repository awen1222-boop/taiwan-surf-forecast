<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Surfer Weather Dashboard</title>
    <style>
        :root { --primary: #3a97e8; --bg: #f0f4f8; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px 10px; }
        .container { width: 100%; max-width: 440px; background: white; border: 2px solid var(--primary); border-radius: 20px; padding: 15px; }
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; border: 1px solid var(--primary); border-radius: 10px; cursor: pointer; background: white; font-weight: bold; }
        .tab-btn.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .panel { padding: 15px; border: 1px solid #ddd; border-radius: 10px; text-align: center; }
        canvas { width: 100%; height: 120px; }
        .status { margin-top: 15px; text-align: center; font-size: 12px; }
        .light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: #22c55e; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏄‍♂️ 浪況儀表板</h1>
    <div class="tabs">
        <button class="tab-btn active" onclick="fetchData('宜蘭', 24.86, 121.84, this)">宜蘭</button>
        <button class="tab-btn" onclick="fetchData('花蓮', 23.97, 121.60, this)">花蓮</button>
        <button class="tab-btn" onclick="fetchData('福隆', 25.02, 121.94, this)">福隆</button>
    </div>

    <div class="grid">
        <div class="panel">浪高<br><span id="wave" style="font-size:24px; font-weight:bold;">--</span> m</div>
        <div class="panel">風速<br><span id="wind" style="font-size:24px; font-weight:bold;">--</span> m/s</div>
    </div>
    
    <div style="font-weight:bold; margin-bottom:5px;">24小時浪高趨勢</div>
    <canvas id="chart"></canvas>

    <div class="status"><div class="light"></div> Open-Meteo 即時連線中</div>
</div>

<script>
    async function fetchData(name, lat, lon, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');

        const url = `https://marine-api.open-meteo.com/v1/marine?latitude=${lat}&longitude=${lon}&hourly=wave_height,wind_speed_10m&timezone=Asia%2FTokyo`;
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            
            // 寫入數據
            const wave = data.hourly.wave_height[0];
            const wind = data.hourly.wind_speed_10m[0];
            
            document.getElementById('wave').innerText = wave !== null ? wave : "--";
            document.getElementById('wind').innerText = wind !== null ? wind : "--";
            
            draw(data.hourly.wave_height.slice(0, 12));
        } catch (e) {
            console.error(e);
            document.getElementById('wave').innerText = "ERR";
        }
    }

    function draw(data) {
        const canvas = document.getElementById('chart');
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#3a97e8";
        
        const barWidth = 20;
        data.forEach((val, i) => {
            if(val === null) return;
            const h = (val || 0) * 30;
            ctx.fillRect(i * 32 + 10, 120 - h, barWidth, h);
        });
    }

    // 啟動
    fetchData('宜蘭', 24.86, 121.84, document.querySelector('.tab-btn'));
</script>
</body>
</html>
