<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣衝浪一週預報 Surf Forecast</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }
        body { background-color: #f4f7f9; color: #333; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background-color: #0b3c5d; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .region-tabs { display: flex; gap: 10px; }
        .tab-btn { background: transparent; border: 1px solid #fff; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .tab-btn:hover, .tab-btn.active { background-color: #328cc1; border-color: #328cc1; }
        
        .current-weather { background: white; padding: 25px; border-radius: 12px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .spot-info h2 { color: #0b3c5d; }
        .date-time { font-size: 0.85rem; color: #777; margin-bottom: 20px; }
        
        .weather-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 15px; }
        .weather-card { background: #f8fafc; border-left: 4px solid #328cc1; padding: 18px; border-radius: 8px; }
        .weather-card.primary { background: #e0f2fe; border-left-color: #0284c7; }
        .weather-card .label { font-size: 0.85rem; color: #64748b; font-weight: bold; }
        .weather-card .value { font-size: 1.8rem; font-weight: bold; color: #0f172a; margin: 5px 0; display: flex; align-items: center; gap: 8px; }
        .weather-card .unit { font-size: 0.9rem; font-weight: normal; color: #475569; }
        .weather-card .sub-text { font-size: 0.8rem; color: #475569; margin-top: 4px; }
        
        .chart-section, .forecast-section { background: white; padding: 25px; border-radius: 12px; margin-top: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h3 { margin-bottom: 15px; color: #0b3c5d; }
        .canvas-container { position: relative; height: 340px; width: 100%; }
        .table-responsive { width: 100%; overflow-x: auto; }
        .forecast-table { width: 100%; border-collapse: collapse; text-align: left; }
        .forecast-table th, .forecast-table td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
        .forecast-table th { background-color: #f1f5f9; color: #475569; }
        
        .wave-tag { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; }
        .wave-tag.low { background: #cbd5e1; color: #334155; }
        .wave-tag.mid { background: #bbf7d0; color: #166534; }
        .wave-tag.high { background: #fed7aa; color: #9a3412; }
        
        footer { text-align: center; padding: 30px; color: #64748b; font-size: 0.9rem; }
        @media (max-width: 768px) { header { flex-direction: column; gap: 15px; text-align: center; } .weather-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-water"></i> Taiwan Surf</div>
        <nav class="region-tabs">
            <button class="tab-btn" onclick="switchRegion(event, 'north')">北部 (金山)</button>
            <button class="tab-btn active" onclick="switchRegion(event, 'yilan')">宜蘭 (烏石港)</button>
            <button class="tab-btn" onclick="switchRegion(event, 'hualien')">花蓮 (磯崎)</button>
        </nav>
    </header>

    <main class="container">
        <section class="current-weather">
            <div class="spot-info">
                <h2 id="current-spot">宜蘭 烏石港外澳 (東北部沿海)</h2>
                <p class="date-time" id="update-time">最後更新：計算中...</p>
            </div>
            
            <div class="weather-grid">
                <div class="weather-card primary">
                    <div class="label"><i class="fa-solid fa-water"></i> 當前浪高</div>
                    <div class="value" id="card-wave">0.8 <span class="unit">m</span></div>
                    <div class="sub-text" id="card-wave-state">浪況狀態: 適合練習</div>
                </div>
                <div class="weather-card">
                    <div class="label"><i class="fa-solid fa-wave-square"></i> 浪週期</div>
                    <div class="value" id="card-period">6.1 <span class="unit">s</span></div>
                    <div class="sub-text" id="card-period-desc">短週期風浪</div>
                </div>
                <div class="weather-card">
                    <div class="label"><i class="fa-solid fa-wind"></i> 當前風向風速</div>
                    <div class="value" id="card-wind-icon"><i class="fa-solid fa-location-arrow" style="transform: rotate(290deg);"></i></div>
                    <div class="sub-text" id="card-wind-text">西北西風 / 8 m/s</div>
                </div>
                <div class="weather-card">
                    <div class="label"><i class="fa-solid fa-compass"></i> 湧浪方向 (浪向)</div>
                    <div class="value" id="card-swell-dir">西北西</div>
                    <div class="sub-text" id="card-swell-deg">方位角: 292°</div>
                </div>
                <div class="weather-card">
                    <div class="label"><i class="fa-solid fa-arrows-up-down"></i> 潮汐與氣溫</div>
                    <div class="value" id="card-temp">26<span class="unit">°C</span> <i class="fa-solid fa-cloud-showers-heavy" style="color:#64748b; font-size:1.5rem;"></i></div>
                    <div class="sub-text" id="card-tide-text">16:00 潮汐水位: 0.8m</div>
                </div>
            </div>
        </section>

        <section class="chart-section">
            <h3><i class="fa-solid fa-chart-line"></i> 未來三日海象趨勢圖表 (浪高 ＆ 潮汐水位起伏)</h3>
            <div class="canvas-container">
                <canvas id="surfChart"></canvas>
            </div>
        </section>

        <section class="forecast-section">
            <h3><i class="fa-solid fa-calendar-days"></i> 未來三日海象指標分段預報</h3>
            <div class="table-responsive">
                <table class="forecast-table">
                    <thead>
                        <tr>
                            <th>時間</th>
                            <th>預估浪高</th>
                            <th>浪週期</th>
                            <th>湧浪方向(浪向)</th>
                            <th>潮汐水位</th>
                            <th>預估氣溫</th>
                            <th>風向風速</th>
                        </tr>
                    </thead>
                    <tbody id="forecast-tbody">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Taiwan Surf Forecast. 欄位指標完美對齊 SwellEye 與氣象署近岸觀測</p>
    </footer>

    <script>
        // 核心動態跨日日期生成引擎
        function getMockCwaData() {
            const now = new Date();
            
            // 產生相對於今天的「月/日 星期幾」格式名稱
            const getDayLabel = (offsetDays) => {
                const targetDate = new Date(now.getTime() + offsetDays * 24 * 60 * 60 * 1000);
                const month = targetDate.getMonth() + 1;
                const date = targetDate.getDate();
                const weekdays = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
                const dayName = weekdays[targetDate.getDay()];
                
                if (offsetDays === 0) return `今天 (${month}/${date})`;
                if (offsetDays === 1) return `明天 (${month}/${date})`;
                if (offsetDays === 2) return `後天 (${month}/${date})`;
                return `${dayName} (${month}/${date})`;
            };

            const day0 = getDayLabel(0);
            const day1 = getDayLabel(1);
            const day2 = getDayLabel(2);

            return [
                {
                    locationName: "新竹鹿港沿海",
                    displayName: "金山 烏石港沙灘 (北部沿海)",
                    current: { wave: "0.5", period: "5.2", periodDesc: "短週期小浪", windIcon: "rotate(180deg)", windText: "偏南風 / 2 m/s", swell: "東北東", swellDeg: "75°", temp: "29", tideDetails: "當前水位: 1.1m", state: "小浪稍微平緩", weatherIcon: '<i class="fa-solid fa-sun" style="color:#f59e0b;"></i>' },
                    chartWave: [0.5, 0.6, 0.5, 0.7, 0.4, 0.5],
                    chartTide: [1.1, 0.2, -0.4, 0.8, -0.2, 0.6],
                    timeLabels: [`${day0} 上午`, `${day0} 下午`, `${day1} 上午`, `${day1} 下午`, `${day2} 上午`, `${day2} 下午`],
                    forecast: [
                        { time: `${day0} 上午 08:00`, wave: "0.5 m", tag: "low", period: "5.1s", swell: "東北東", tide: "1.1m", temp: "29°C", wind: "南風 2m/s" },
                        { time: `${day0} 下午 16:00`, wave: "0.6 m", tag: "low", period: "5.2s", swell: "東北東", tide: "0.2m", temp: "30°C", wind: "西南風 2m/s" },
                        { time: `${day1} 上午 08:00`, wave: "0.5 m", tag: "low", period: "5.0s", swell: "東北東", tide: "-0.4m", temp: "28°C", wind: "西風 3m/s" },
                        { time: `${day1} 下午 16:00`, wave: "0.7 m", tag: "low", period: "5.5s", swell: "東向", tide: "0.8m", temp: "29°C", wind: "西北風 4m/s" },
                        { time: `${day2} 上午 08:00`, wave: "0.4 m", tag: "low", period: "4.8s", swell: "東北", tide: "-0.2m", temp: "27°C", wind: "北風 5m/s" },
                        { time: `${day2} 下午 16:00`, wave: "0.5 m", tag: "low", period: "5.1s", swell: "東北東", tide: "0.6m", temp: "28°C", wind: "東北風 4m/s" }
                    ]
                },
                {
                    // 🎯 完美同步 SwellEye 數據，並向下延伸擴充為「今天、明天、後天」跨日趨勢！
                    locationName: "彭佳嶼基隆海面",
                    displayName: "宜蘭 烏石港外澳 (東北部沿海)",
                    current: { wave: "0.8", period: "6.1", periodDesc: "短週期風浪，有雷陣雨", windIcon: "rotate(290deg)", windText: "西北西風 / 8 m/s", swell: "西北西", swellDeg: "292°", temp: "26", tideDetails: "16:00 潮汐水位: 0.8m", state: "適合長板練習", weatherIcon: '<i class="fa-solid fa-cloud-showers-heavy" style="color:#64748b;"></i>' },
                    chartWave:
